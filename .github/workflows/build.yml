name: Build YadduGuard JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: YadduGuard-JAR
          path: target/YadduGuard-*.jar
          retention-days: 30

      - name: Print JAR info
        run: |
          echo "===== BUILD DONE ====="
          ls -lh target/YadduGuard-*.jar
          echo "Download se Artifacts section mein milega"
